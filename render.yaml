# Render Blueprint — Black Voyage Product Tracker (SuperPM Fork)
# Static site. The SuperPM Fork is index.html, so it is served as the homepage ("/").
# The main dashboard is dashboard.html (reachable at /dashboard.html).
services:
  - type: web
    name: bv-superpm
    runtime: static
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
